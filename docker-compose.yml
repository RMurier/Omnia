name: omnia

networks:
  omnia-net:

volumes:
  omnia-db-data:

services:
  db:
    image: postgres:16
    container_name: omnia_db
    environment:
      POSTGRES_DB: Omnia
      POSTGRES_USER: Omnia
      POSTGRES_PASSWORD: IUSR_OMNIA
    volumes:
      - omnia-db-data:/var/lib/postgresql/data
    networks:
      - omnia-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: omnia/api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=Omnia;Username=Omnia;Password=IUSR_OMNIA"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
    depends_on:
      - db
    networks:
      - omnia-net

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_ENV: production
    image: omnia/front:latest
    # Nginx interne de l'image front écoute sur 80
    depends_on:
      - api
    networks:
      - omnia-net

  gateway:
    image: nginx:alpine
    container_name: omnia_gateway
    depends_on:
      - front
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/prod/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./certs/prod/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    networks:
      - omnia-net