name: omnia-dev

networks:
  omnia-dev-net:

volumes:
  omnia-dev-db-data:

services:
  db_dev:
    image: postgres:16
    container_name: omnia_db_dev
    environment:
      POSTGRES_DB: OmniaDev
      POSTGRES_USER: Omnia
      POSTGRES_PASSWORD: IUSR_OMNIA
    volumes:
      - omnia-dev-db-data:/var/lib/postgresql/data
    networks:
      - omnia-dev-net

  api_dev:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: build
    container_name: api_dev
    working_dir: /src
    volumes:
      - ./api:/src
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db_dev;Port=5432;Database=OmniaDev;Username=Omnia;Password=IUSR_OMNIA"
    depends_on:
      - db_dev
    networks:
      - omnia-dev-net

  front_dev:
    image: node:20
    container_name: front_dev
    working_dir: /app
    volumes:
      - ./front:/app
    environment:
      # Le front appelle toujours /api côté navigateur
      VITE_API_URL: "/api"
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    depends_on:
      - api_dev
    networks:
      - omnia-dev-net

  gateway_dev:
    image: nginx:alpine
    container_name: omnia_gateway_dev
    depends_on:
      - front_dev
      - api_dev
    ports:
      - "8080:80"   
      - "8443:443"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/dev/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./certs/dev/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    networks:
      - omnia-dev-net
